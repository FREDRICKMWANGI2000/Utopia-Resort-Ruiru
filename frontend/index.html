<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Primary Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- SEO -->
    <title>
      Utopia Resort Ruiru | Luxury Resort, Swimming Pools, Boat Riding &
      Family Entertainment

    <meta
      name="description"
      content="Discover Utopia Resort Ruiru, the ultimate luxury getaway offering swimming pools, boat riding, jet skiing, family entertainment, dining, events, relaxation, and unforgettable resort experiences in Kenya."
    />

    <meta
      name="keywords"
      content="Utopia Resort Ruiru, luxury resort Kenya, resorts in Ruiru, swimming pools, boat riding, jet ski adventure, family resort, events venue, weekend getaway, best resort in Ruiru, relaxation resort Kenya"

    <meta name="author" content="Utopia Resort Ruiru" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Theme -->
    <meta name="theme-color" content="#030a47" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Utopia Resort Ruiru" />
    <meta
      property="og:description"
      content="Luxury resort experience in Ruiru featuring swimming pools, boat rides, jet skiing, dining, entertainment, and family fun."
    />
    <meta property="og:image" content="/images/utopia-preview.jpg" />
    <meta property="og:url" content="https://www.utopiaresort.co.ke" />
    <meta property="og:site_name" content="Utopia Resort Ruiru" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Utopia Resort Ruiru" />
    <meta
      name="twitter:description"
      content="Experience luxury, relaxation, swimming, entertainment, and unforgettable resort adventures in Ruiru."
    />
    <meta name="twitter:image" content="/images/utopia-preview.jpg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.utopiaresort.co.ke" />

    <!-- Favicons -->
    <link rel="icon" href="./favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./favicon-16x16.png"
    />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Mobile / PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Utopia Resort" />

    <!-- Fonts Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      rel="dns-prefetch"
      href="//fonts.googleapis.com"
    />
    <link
      rel="dns-prefetch"
      href="//fonts.gstatic.com"
    />

      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
